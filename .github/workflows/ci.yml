name: CI/CD

on:
  push:
    branches: [main, master, master-inventory]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:

  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: jetbrains
          java-version: 21
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: gradle/actions/setup-gradle@v4

      - name: Run JVM tests
        run: ./gradlew :composeApp:jvmTest -Dorg.gradle.java.home="$JAVA_HOME"

      - name: Run Android unit tests
        run: ./gradlew :composeApp:testDebugUnitTest -Dorg.gradle.java.home="$JAVA_HOME"

  # Android
  build-android:
    name: Android APK
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: jetbrains
          java-version: 21
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: gradle/actions/setup-gradle@v4

      - name: Build debug APK
        run: ./gradlew :composeApp:assembleDebug -Dorg.gradle.java.home="$JAVA_HOME"

      - uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: composeApp/build/outputs/apk/debug/*.apk
          if-no-files-found: error


  # Desktop: Windows
  build-windows:
    name: Desktop (Windows)
    runs-on: windows-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: jetbrains
          java-version: 21
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: gradle/actions/setup-gradle@v4

      - name: Package MSI / EXE
        shell: bash
        run: |
          ./gradlew \
            :composeApp:packageMsi \
            :composeApp:packageExe \
            -Dorg.gradle.java.home="$JAVA_HOME"

      - uses: actions/upload-artifact@v4
        with:
          name: windows-installers
          path: |
            composeApp/build/compose/binaries/main/msi/*.msi
            composeApp/build/compose/binaries/main/exe/*.exe
          if-no-files-found: error
